name: React Trading Test Actions
run-name: Testing React App on develop branch

on:
  push:
    branches:
      - develop
    paths:
      - "react_trading_app/**"
  workflow_dispatch:

jobs:
  React-GitHub-Actions:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'

      - name: Install dependencies
        run: |
          cd react_trading_app/frontend
          npm install

      - name: Build app
        run: |
          cd react_trading_app/frontend
          npm run build